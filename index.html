<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR-INTEL: NEURAL SENTINEL</title>
    <style>
        /* All your design and mobile UI fixes are preserved exactly as they were */
        :root {
            --bg-base: #050505;
            --glow-primary: #fb7185; 
            --glow-secondary: #e11d48; 
            --danger-red: #fb7185;
            --panel-bg: rgba(20, 10, 12, 0.7);
            --card-bg: rgba(30, 15, 20, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

        body {
            background-color: var(--bg-base);
            background-image: 
                linear-gradient(rgba(251, 113, 133, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(251, 113, 133, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 50% 0%, rgba(225, 29, 72, 0.15), transparent 50%);
            background-size: 30px 30px, 30px 30px, 100% 100%;
            background-position: center top;
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 2rem; overflow-x: hidden;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: rgba(17, 24, 39, 0.95); padding: 3rem; border-radius: 16px;
            border: 1px solid rgba(251, 113, 133, 0.3); box-shadow: 0 0 50px rgba(251, 113, 133, 0.15);
            text-align: center; max-width: 500px; width: 90%;
        }
        .modal-btn {
            background: rgba(251, 113, 133, 0.1); border: 1px solid var(--danger-red); color: var(--danger-red);
            padding: 1rem 3rem; font-size: 1rem; font-weight: 700; border-radius: 4px; cursor: pointer; text-transform: uppercase;
        }

        /* --- HEADER & SEARCH --- */
        .dashboard-header { text-align: center; margin-bottom: 3rem; }
        .dashboard-header h1 { font-size: 3rem; font-weight: 900; background: linear-gradient(to right, var(--glow-primary), var(--glow-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { display: inline-block; padding: 0.4rem 1.2rem; background: rgba(251, 113, 133, 0.1); border: 1px solid rgba(251, 113, 133, 0.3); border-radius: 50px; color: var(--glow-primary); margin-bottom: 1.5rem; }
        .search-container { background: var(--panel-bg); padding: 2rem; border-radius: 16px; width: 100%; max-width: 900px; display: flex; gap: 15px; }
        input[type="tel"] { flex: 1; padding: 1.2rem; border-radius: 8px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(251, 113, 133, 0.2); color: #fff; outline: none; }
        .initiate-btn { padding: 0 2.5rem; border-radius: 8px; border: 1px solid var(--glow-secondary); background: rgba(225, 29, 72, 0.2); color: white; font-weight: 700; cursor: pointer; }

        /* --- RESULTS --- */
        #results { width: 100%; max-width: 1000px; display: none; margin-top: 2rem; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .data-card { background: var(--card-bg); border-left: 3px solid var(--glow-primary); border-radius: 8px; padding: 1.5rem; }
        .card-label { color: var(--text-muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem; }
        .card-value { color: #fff; font-size: 1.15rem; word-wrap: break-word; }
        .nested-folder { grid-column: 1 / -1; margin-top: 2rem; background: rgba(0,0,0,0.2); padding: 2rem; border-radius: 12px; border: 1px solid rgba(225, 29, 72, 0.2); position: relative; }
        .folder-title { position: absolute; top: -12px; left: 20px; background: var(--bg-base); padding: 0 15px; color: var(--glow-secondary); font-size: 0.85rem; font-weight: 700; }

        /* --- FOOTER --- */
        .credit-footer { margin-top: 4rem; display: flex; align-items: center; gap: 15px; }
        .credit-name { color: #fff; font-size: 1.1rem; font-weight: 800; text-shadow: 0 0 15px var(--glow-primary); }

        @media (max-width: 600px) {
            .dashboard-header h1 { font-size: 1.8rem; }
            .search-container { flex-direction: column; }
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="warningModal" class="modal-overlay">
        <div class="modal-content">
            <h2>System Override</h2>
            <p>You are accessing AR-INTEL: NEURAL SENTINEL. Authorized academic demonstration only. Developed By Aditya Raj</p>
            <button class="modal-btn" onclick="acceptWarning()">I Understand</button>
        </div>
    </div>

    <div class="dashboard-header">
        <div class="badge">SECURE CONNECTION ESTABLISHED</div>
        <h1>TARGET ACQUISITION</h1>
    </div>

    <div class="search-container">
        <input type="tel" id="phoneNumber" placeholder="Enter Number without +91" autocomplete="off">
        <button id="searchBtn" class="initiate-btn" onclick="performLookup()">TRACE</button>
    </div>

    <div id="results"></div>

    <div class="credit-footer">
        <div style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">System Architect:</div>
        <div class="credit-name">ADITYA RAJ</div>
    </div>

    <script>
        // --- 1. MODAL LOGIC (Always Top-Level) ---
        function acceptWarning() {
            const modal = document.getElementById('warningModal');
            modal.style.display = 'none';
        }

        // --- 2. NETWORK ENGINE ---
        async function performLookup() {
            const phoneInput = document.getElementById('phoneNumber').value.trim();
            const resultsDiv = document.getElementById('results');
            const searchBtn = document.getElementById('searchBtn');

            if (!phoneInput) { alert("Target MSISDN required."); return; }

            // SATIRE PROTECTION
            const blocked = ["8252584063", "8298709184"];
            if (blocked.some(num => phoneInput.includes(num))) {
                resultsDiv.style.display = 'block';
                resultsDiv.innerHTML = `
                    <div style="background: rgba(251, 113, 133, 0.1); border: 1px solid var(--danger-red); padding: 2.5rem; border-radius: 12px; text-align: center;">
                        <div style="font-size: 3rem;">🛑</div>
                        <h3 style="color: var(--danger-red);">Audacity Detected</h3>
                        <p style="color: #fff;">Tracing the <b>Architect</b>? System identified a severe 'Skill Issue.' Number protected by 256-bit encryption. Go trace a pizza. Lol 🖕</p>
                    </div>`;
                return;
            }

            resultsDiv.style.display = 'none';
            searchBtn.disabled = true;

            try {
                let targetUrl;
                
                // HYBRID LOGIC: Detects if you're on Cloudflare or Localhost
                if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname.includes('github.io')) {
                    // Falls back to proxy only for testing
                    const rawUrl = `https://paid.proportalxc.workers.dev/number?key=1kSubscriber&num=${encodeURIComponent(phoneInput)}`;
                    targetUrl = `https://corsproxy.io/?${encodeURIComponent(rawUrl)}`;
                } else {
                    // Uses the professional tunnel on production
                    targetUrl = `/api/number?key=1kSubscriber&num=${encodeURIComponent(phoneInput)}`;
                }
                
                const response = await fetch(targetUrl);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                
                const data = await response.json();
                displayResults(data);

            } catch (error) {
                resultsDiv.style.display = 'block';
                resultsDiv.innerHTML = `<div style="background: rgba(251, 113, 133, 0.1); border-left: 4px solid var(--danger-red); padding: 1.5rem; color: #fff;">CRITICAL ERROR: ${error.message}</div>`;
            } finally {
                searchBtn.disabled = false;
            }
        }

        // --- 3. UI RENDER ENGINE ---
        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '';
            const mainGrid = document.createElement('div');
            mainGrid.className = 'grid-container';
            resultsDiv.appendChild(mainGrid);

            function parseData(obj, container) {
                for (const [key, value] of Object.entries(obj)) {
                    // Watermark Filter
                    const kStr = key.toLowerCase();
                    if (kStr.includes('developer') || kStr.includes('proportalx') || kStr.includes('channel')) continue;

                    const fKey = key.replace(/([A-Z])/g, ' $1').toUpperCase().replace(/_/g, ' ');
                    if (value !== null && typeof value === 'object') {
                        const fDiv = document.createElement('div');
                        fDiv.className = 'nested-folder';
                        fDiv.innerHTML = `<div class="folder-title">${fKey}</div>`;
                        const sGrid = document.createElement('div');
                        sGrid.className = 'grid-container';
                        parseData(value, sGrid);
                        fDiv.appendChild(sGrid);
                        container.appendChild(fDiv);
                    } else {
                        const card = document.createElement('div');
                        card.className = 'data-card';
                        card.innerHTML = `<div class="card-label">■ ${fKey}</div><div class="card-value">${value || 'N/A'}</div>`;
                        container.appendChild(card);
                    }
                }
            }
            parseData(data, mainGrid);
        }
    </script>
</body>
</html>
